# =============================================================================
# tmux starter configuration
# =============================================================================
# A portable, zero-dependency tmux config for macOS and Linux.
# Place this file at ~/.tmux.conf or symlink it there.
# =============================================================================


# ---------------------------------------------------------------------------
# PREFIX KEY
# ---------------------------------------------------------------------------
# Remap prefix from Ctrl+b to Ctrl+a (closer to home row, screen-style).
unbind C-b
set -g prefix C-a
bind C-a send-prefix              # Press Ctrl+a twice to send literal Ctrl+a


# ---------------------------------------------------------------------------
# GENERAL SETTINGS
# ---------------------------------------------------------------------------
set -g mouse on                   # Enable mouse for pane/window selection & resizing
set -g history-limit 50000        # Generous scrollback buffer
set -g renumber-windows on        # Re-number windows when one is closed
set -g set-clipboard on           # Allow tmux to set the system clipboard
set -g set-titles on              # Let tmux set the terminal (iTerm2) tab title
set -g set-titles-string "#S"     # Use the session name as the title

# Start window and pane numbering at 1 (matches keyboard layout left-to-right)
set -g base-index 1
setw -g pane-base-index 1

# Fast escape time — critical for vim/neovim so Esc isn't laggy
set -sg escape-time 10

# Enable focus events (useful for vim autoread, etc.)
set -g focus-events on


# ---------------------------------------------------------------------------
# TRUE COLOR (24-BIT) SUPPORT
# ---------------------------------------------------------------------------
# Set the default terminal to support 256 colors as a baseline
set -g default-terminal "tmux-256color"

# Enable true color (RGB) passthrough for terminals that support it
# This covers the most common modern terminals on macOS and Linux
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",alacritty:RGB"
set -ag terminal-overrides ",*-256color:RGB"


# ---------------------------------------------------------------------------
# COPY MODE (VI-STYLE)
# ---------------------------------------------------------------------------
setw -g mode-keys vi              # Use vi keys in copy mode

# Enter copy mode with prefix + [  (default)
# Start selection with 'v', copy with 'y'
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# Rectangle (block) selection with Ctrl+v
bind -T copy-mode-vi C-v send -X rectangle-toggle


# ---------------------------------------------------------------------------
# PANE SPLITTING
# ---------------------------------------------------------------------------
# Intuitive splits: | for vertical (side by side), - for horizontal (stacked)
# New panes open in the same directory as the current pane.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Unbind the defaults (optional — keeps things tidy)
unbind '"'
unbind %

# New windows also open in the current directory
bind c new-window -c "#{pane_current_path}"


# ---------------------------------------------------------------------------
# PANE NAVIGATION
# ---------------------------------------------------------------------------
# Alt + arrow keys to switch panes — no prefix needed for speed
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Prefix + h/j/k/l for vi-style pane navigation (alternative)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


# ---------------------------------------------------------------------------
# PANE RESIZING
# ---------------------------------------------------------------------------
# Prefix + Shift+arrow to resize panes in 5-cell increments
bind -r S-Left  resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up    resize-pane -U 5
bind -r S-Down  resize-pane -D 5


# ---------------------------------------------------------------------------
# WINDOW NAVIGATION
# ---------------------------------------------------------------------------
# Shift + Left/Right to switch windows — no prefix needed
bind -n S-Left  previous-window
bind -n S-Right next-window


# ---------------------------------------------------------------------------
# RELOAD CONFIG
# ---------------------------------------------------------------------------
# Prefix + r to reload this config file and show a confirmation
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"


# ---------------------------------------------------------------------------
# STATUS BAR
# ---------------------------------------------------------------------------
set -g status-position bottom
set -g status-interval 5          # Refresh every 5 seconds

# Colors — muted theme that works on light and dark backgrounds
set -g status-style "bg=colour235,fg=colour248"

# Left: session name
set -g status-left-length 30
set -g status-left " #[fg=colour76,bold]#S #[fg=colour240]| "

# Center: window list
setw -g window-status-format "#[fg=colour244] #I:#W "
setw -g window-status-current-format "#[fg=colour222,bold,bg=colour238] #I:#W "
setw -g window-status-separator ""

# Right: git branch, directory, and time
set -g status-right-length 80
set -g status-right "#[fg=colour109]#{?#{==:#(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null),}, ,  #(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null) }#[fg=colour240]| #[fg=colour248]#{b:pane_current_path} #[fg=colour240]| #[fg=colour222]%H:%M #[fg=colour244]%d-%b "

# Pane borders
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=colour76"

# Message/command prompt styling
set -g message-style "bg=colour235,fg=colour222,bold"


# ---------------------------------------------------------------------------
# PLUGINS (via TPM — Tmux Plugin Manager)
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect settings — save/restore pane contents and processes
set -g @resurrect-capture-pane-contents 'on'

# Continuum — auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Manual save/restore:  prefix + Ctrl-s / prefix + Ctrl-r

# Initialize TPM (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
